[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Formulaire de contact : page de confirmation après envoi Netlify Forms
[[redirects]]
  from = "/merci"
  to = "/merci/"
  status = 301

[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200

[context.production]
  environment = { NODE_ENV = "production" }
