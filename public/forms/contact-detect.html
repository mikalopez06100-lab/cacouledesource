<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <title>Formulaire contact — détection Netlify</title>
  </head>
  <body>
    <!-- Fichier statique pour que Netlify détecte le formulaire au build (Astro SSG) -->
    <form name="contact" netlify data-netlify="true" data-netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="contact" />
      <input name="bot-field" />
      <input name="nom" />
      <input name="tel" />
      <input name="ville" />
      <textarea name="message"></textarea>
    </form>
  </body>
</html>
